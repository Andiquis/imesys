<div class="flex items-center justify-center min-h-screen  text-gray-900">
  <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-md text-center border border-gray-300 flex flex-col items-center">
    <h2 class="text-3xl font-bold mb-4 text-blue-500">Detección de Neumonía</h2>
  
  
    <!-- Botón de subida -->
    <label class="cursor-pointer bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg shadow-md transition-all flex items-center gap-2">
      📁 <span>Subir Imagen</span>
      <input type="file" #fileInput class="hidden" (change)="onFileSelected($event)">
    </label>
  
    <!-- Mostrar imagen seleccionada -->
    <div *ngIf="imagenUrl" class="mt-4 flex justify-center">
      <img [src]="imagenUrl" alt="Imagen seleccionada" class="w-64 h-64 object-cover rounded-lg shadow-md border border-gray-300">
    </div>
  
    <!-- Mostrar resultado -->
    <div *ngIf="resultado" class="mt-4 p-4 bg-gray-900 text-white rounded-lg shadow-lg text-center w-80 flex flex-col items-center">
      <p class="text-lg font-semibold text-green-400 flex items-center gap-2">
        {{ resultado }} <span class="text-gray-400">📖</span>
      </p>
    </div>
  
    <!-- Mensaje de procesamiento -->
    <p *ngIf="procesando" class="mt-2 text-yellow-500">Procesando imagen... ⏳</p>
  
    <!-- Botón de Reiniciar -->
    <button 
      (click)="reset(fileInput)" 
      [disabled]="procesando" 
      class="mt-4 bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 rounded-lg shadow-md transition-all disabled:opacity-50 flex items-center gap-2"
    >
      🔄 <span>Reiniciar</span>
    </button>
  </div>
</div>
